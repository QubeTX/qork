# Windows Installers — Corporate MSI + Global/Corporate EXE installers.
#
# Hand-authored workflow — NOT generated by cargo-dist. We deliberately do not
# touch the auto-generated .github/workflows/release.yml; the only
# customization needed there is the `allow-dirty = ["msi"]` entry in Cargo.toml's
# [workspace.metadata.dist] (so cargo-dist doesn't regenerate the hand-edited
# wix/main.wxs).
#
# Builds three add-on artifacts per release (plus a .sha256 sidecar for each):
#   - qork-x86_64-pc-windows-msvc-corporate.msi        (perUser MSI from wix-corporate/corporate.wxs)
#   - qork-x86_64-pc-windows-msvc-setup.exe            (perMachine EXE from inno/global.iss)
#   - qork-x86_64-pc-windows-msvc-corporate-setup.exe  (perUser EXE from inno/corporate.iss)
#
# The standard Global MSI (qork-x86_64-pc-windows-msvc.msi) is produced by
# cargo-dist's release.yml — this workflow does NOT rebuild it.
#
# Sequencing: both this workflow and release.yml fire on the same tag push.
# cargo-dist's release.yml creates the GitHub Release; this workflow waits for
# that release to exist (poll loop below) before uploading its six add-on
# assets to it.
#
# If install paths or registry-marker values change in wix/main.wxs,
# wix-corporate/corporate.wxs, or inno/*.iss, update
# src/update.rs::classify_install_path() / read_install_source_marker() in
# lockstep.

name: Windows Installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installers to (e.g. v1.0.1)"
        required: true
        type: string

permissions:
  contents: write # required for `gh release upload`

jobs:
  build-windows-installers:
    name: Build Corporate MSI + Global EXE + Corporate EXE
    runs-on: windows-2022

    steps:
      - name: Enable Windows long paths
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Resolve target tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Expected tag to start with 'v', got '$tag'"
          }
          $version = $tag -replace '^v', ''
          Add-Content -Path $env:GITHUB_OUTPUT -Value "tag=$tag"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Write-Host "Tag:     $tag"
          Write-Host "Version: $version"
          Write-Host "Event:   ${{ github.event_name }}"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      # rust-toolchain.toml at repo root pins channel=1.95 + rustfmt + clippy.
      # dtolnay/rust-toolchain@stable honors this file (channel pin wins over
      # the action's "stable" arg), so cargo-wix + Inno Setup get a Rust version
      # that matches the repo MSRV.
      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build qork.exe (release)
        shell: pwsh
        run: cargo build --release --locked

      - name: Build Corporate MSI via bare candle + light
        shell: pwsh
        run: |
          # The Corporate MSI is built with WiX 3 candle/light directly (NOT
          # through cargo-wix). cargo-wix compiles every .wxs file in `wix/` and
          # links them into ONE MSI; putting corporate.wxs alongside main.wxs
          # hits LGHT0089/0091/0092 "Multiple entry sections" + "Duplicate
          # symbol" errors at link time. corporate.wxs lives in wix-corporate/
          # (a separate directory) precisely so cargo-wix's default scan of
          # wix/ produces only the Global MSI cleanly.
          #
          # WiX 3.x is preinstalled on windows-2022 runners — the install
          # registers $env:WIX pointing at the install root. Standard paths:
          #   - $env:WIX\bin\candle.exe (compiler)
          #   - $env:WIX\bin\light.exe (linker)
          #
          # -sice:ICE38 / ICE64 / ICE91 suppress per-user MSI convention
          # violations from light. These ICEs require Components in user-profile
          # directories to have HKCU RegistryValue KeyPaths (not File KeyPaths)
          # and Directories to have RemoveFile/RemoveFolder entries. For our
          # single-binary install they're cosmetic — install and uninstall both
          # work correctly; the only consequence is an empty
          # %LocalAppData%\Programs\qork\bin\ folder left after uninstall.
          $candle = "$env:WIX\bin\candle.exe"
          $light  = "$env:WIX\bin\light.exe"
          if (-not (Test-Path $candle)) { throw "candle.exe not found at $candle" }
          if (-not (Test-Path $light))  { throw "light.exe not found at $light" }

          New-Item -ItemType Directory -Force -Path target\wix | Out-Null

          # Quote -d... args. Without quotes, PowerShell parses
          # `-dVersion=1.0.1` as `-dVersion=1` followed by `.0.1` (the dots in
          # the version string break tokenization), so candle ends up seeing
          # `.0.1` as a source filename and errors with CNDL0103. Quoting forces
          # the whole assignment to be one string literal.
          & $candle -arch x64 `
            "-dVersion=${{ steps.tag.outputs.version }}" `
            "-dCargoTargetBinDir=target\release" `
            -out target\wix\corporate.wixobj `
            wix-corporate\corporate.wxs
          if ($LASTEXITCODE -ne 0) { throw "candle failed with exit $LASTEXITCODE" }

          & $light -sice:ICE38 -sice:ICE64 -sice:ICE91 `
            -ext WixUIExtension `
            -out target\wix\qork-x86_64-pc-windows-msvc-corporate.msi `
            target\wix\corporate.wixobj
          if ($LASTEXITCODE -ne 0) { throw "light failed with exit $LASTEXITCODE" }

          if (-not (Test-Path "target\wix\qork-x86_64-pc-windows-msvc-corporate.msi")) {
            throw "Corporate MSI build failed — output file missing"
          }
          Write-Host "Corporate MSI built"

      # Chocolatey is preinstalled on windows-2022 runners. Installs Inno Setup
      # 6 to C:\Program Files (x86)\Inno Setup 6\.
      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress --no-color
          if (-not (Test-Path "C:\Program Files (x86)\Inno Setup 6\iscc.exe")) {
            throw "Inno Setup install failed — iscc.exe missing"
          }
          Write-Host "Inno Setup 6 installed"

      - name: Build Global EXE installer
        shell: pwsh
        run: |
          # /DMyAppVersion overrides the #define in inno/global.iss so the
          # version embedded in the EXE matches the release tag. Quote /D... to
          # survive PowerShell's dot-aware tokenizer (same reason candle args
          # are quoted above).
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DMyAppVersion=${{ steps.tag.outputs.version }}" inno\global.iss
          if (-not (Test-Path "inno\Output\qork-x86_64-pc-windows-msvc-setup.exe")) {
            throw "Global EXE installer build failed — output missing"
          }
          Write-Host "Global EXE installer built"

      - name: Build Corporate EXE installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" "/DMyAppVersion=${{ steps.tag.outputs.version }}" inno\corporate.iss
          if (-not (Test-Path "inno\Output\qork-x86_64-pc-windows-msvc-corporate-setup.exe")) {
            throw "Corporate EXE installer build failed — output missing"
          }
          Write-Host "Corporate EXE installer built"

      - name: Compute SHA256 sidecars
        shell: pwsh
        run: |
          $files = @(
            "target\wix\qork-x86_64-pc-windows-msvc-corporate.msi",
            "inno\Output\qork-x86_64-pc-windows-msvc-setup.exe",
            "inno\Output\qork-x86_64-pc-windows-msvc-corporate-setup.exe"
          )
          foreach ($f in $files) {
            $hash = (Get-FileHash $f -Algorithm SHA256).Hash.ToLower()
            $name = Split-Path $f -Leaf
            # Matches the cargo-dist sidecar format: lowercase-hex SHA256, space,
            # asterisk, filename. No trailing newline.
            $line = "$hash *$name"
            [System.IO.File]::WriteAllText("$f.sha256", $line)
            Write-Host "  $name  ->  $hash"
          }

      - name: Wait for cargo-dist release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # This workflow and cargo-dist's release.yml fire on the same tag
          # push. release.yml creates the GitHub Release (via `gh release
          # create`); we must wait for it before uploading our add-on assets.
          # Poll up to ~20 minutes (release.yml builds 6 target platforms first).
          $tag  = "${{ steps.tag.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $deadline = (Get-Date).AddMinutes(20)
          $found = $false
          while ((Get-Date) -lt $deadline) {
            gh release view $tag --repo $repo > $null 2>&1
            if ($LASTEXITCODE -eq 0) {
              $found = $true
              break
            }
            Write-Host "Release $tag not published yet; waiting 30s..."
            Start-Sleep -Seconds 30
          }
          if (-not $found) {
            throw "Timed out waiting for release $tag to be published by release.yml. Re-run this workflow once the release exists: gh workflow run 'Windows Installers' -f tag=$tag"
          }
          Write-Host "Release $tag is published — proceeding to upload."

      - name: Upload artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          # --clobber so re-running this workflow doesn't require manually
          # deleting old assets first.
          gh release upload "${{ steps.tag.outputs.tag }}" `
            "target\wix\qork-x86_64-pc-windows-msvc-corporate.msi" `
            "target\wix\qork-x86_64-pc-windows-msvc-corporate.msi.sha256" `
            "inno\Output\qork-x86_64-pc-windows-msvc-setup.exe" `
            "inno\Output\qork-x86_64-pc-windows-msvc-setup.exe.sha256" `
            "inno\Output\qork-x86_64-pc-windows-msvc-corporate-setup.exe" `
            "inno\Output\qork-x86_64-pc-windows-msvc-corporate-setup.exe.sha256" `
            --repo "${{ github.repository }}" `
            --clobber
          Write-Host "Uploaded 6 assets to ${{ steps.tag.outputs.tag }}"
