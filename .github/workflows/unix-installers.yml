# Unix Installers — macOS .pkg + Linux .deb/.rpm installers.
#
# Hand-authored workflow — NOT generated by cargo-dist. Companion to
# windows-installers.yml. cargo-dist's release.yml produces the raw
# `qork-<target>.tar.xz` archives (and the shell/PowerShell installers); this
# workflow turns those archives into native OS installers and attaches them to
# the same GitHub Release.
#
# Builds, per release (plus a .sha256 sidecar for each):
#   macOS (unsigned, built with pkgbuild):
#     - qork-aarch64-apple-darwin.pkg          (Apple Silicon)
#     - qork-x86_64-apple-darwin.pkg           (Intel)
#   Linux (built with nfpm from nfpm.yaml):
#     - qork-x86_64-unknown-linux-gnu.deb
#     - qork-x86_64-unknown-linux-gnu.rpm
#     - qork-aarch64-unknown-linux-gnu.deb
#     - qork-aarch64-unknown-linux-gnu.rpm
#
# Both .pkg installers drop the binary at /usr/local/bin/qork; the .deb/.rpm
# packages install it to /usr/bin/qork. macOS/Linux self-update goes through
# qork's existing shell/cargo strategy chain (src/update.rs) — there is NO
# install-origin marker on these platforms, so no update.rs change is needed
# to add this workflow.
#
# Sequencing: this workflow and release.yml fire on the same tag push.
# release.yml creates the GitHub Release (and uploads the .tar.xz archives this
# workflow consumes); each job below polls until the release exists, downloads
# the archives it needs, then uploads its installers with `--clobber` so
# re-runs are idempotent and don't race release.yml.

name: Unix Installers

on:
  push:
    tags:
      - "**[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach installers to (e.g. v1.0.1 or 1.0.1)"
        required: true
        type: string

permissions:
  contents: write # required for `gh release upload`

jobs:
  # ── macOS: .pkg for both arm64 and x86_64 ─────────────────────────────────
  macos-pkg:
    name: Build macOS .pkg (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Resolve target tag and version
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          # Strip a leading 'v' if present (release.yml accepts both "1.0.1"
          # and "v1.0.1" style tags). Some package tooling requires the version
          # to start with a digit, so the bare version is what we feed downstream.
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag:     $tag"
          echo "Version: $version"
          echo "Target:  ${{ matrix.target }}"

      - name: Wait for cargo-dist release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # This workflow and release.yml fire on the same tag push. release.yml
          # creates the GitHub Release (via `gh release create`) and uploads the
          # .tar.xz archives we consume. Poll up to ~20 minutes (release.yml
          # builds 6 target platforms first). --repo is passed explicitly because
          # this step runs before any checkout, so `gh` has no local git context.
          tag="${{ steps.tag.outputs.tag }}"
          repo="${{ github.repository }}"
          deadline=$(( $(date +%s) + 20 * 60 ))
          found=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
              found=1
              break
            fi
            echo "Release $tag not published yet; waiting 30s..."
            sleep 30
          done
          if [ "$found" -ne 1 ]; then
            echo "Timed out waiting for release $tag to be published by release.yml." >&2
            echo "Re-run once the release exists: gh workflow run 'Unix Installers' -f tag=$tag" >&2
            exit 1
          fi
          echo "Release $tag is published — proceeding."

      - name: Download target archive from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          repo="${{ github.repository }}"
          archive="qork-${{ matrix.target }}.tar.xz"
          mkdir -p dl
          gh release download "$tag" --repo "$repo" --pattern "$archive" --dir dl
          if [ ! -f "dl/$archive" ]; then
            echo "Expected archive dl/$archive not found after download" >&2
            exit 1
          fi
          echo "Downloaded $archive"

      - name: Stage binary and build .pkg
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.tag.outputs.version }}"
          archive="qork-${{ matrix.target }}.tar.xz"

          # Extract the archive. cargo-dist tar.xz archives place `qork` at the
          # archive root, but locate it with `find` so we're robust to a future
          # layout change (e.g. a top-level wrapper directory).
          mkdir -p extract stage/usr/local/bin pkgout
          tar -xJf "dl/$archive" -C extract
          bin="$(find extract -type f -name qork | head -n1)"
          if [ -z "$bin" ]; then
            echo "Could not find the qork binary inside $archive" >&2
            exit 1
          fi
          install -m 0755 "$bin" stage/usr/local/bin/qork

          # Unsigned component package. --root stages a file tree relative to
          # --install-location (/), so stage/usr/local/bin/qork installs to
          # /usr/local/bin/qork. No Apple Developer ID signing (no certs in CI);
          # users may need to allow it via Gatekeeper / `xattr -d`.
          pkgbuild \
            --identifier com.qubetx.qork \
            --version "$version" \
            --install-location / \
            --root stage \
            "pkgout/qork-${{ matrix.target }}.pkg"

          if [ ! -f "pkgout/qork-${{ matrix.target }}.pkg" ]; then
            echo "pkgbuild did not produce the expected .pkg" >&2
            exit 1
          fi
          echo "Built qork-${{ matrix.target }}.pkg"

      - name: Compute SHA256 sidecar
        shell: bash
        run: |
          set -euo pipefail
          f="pkgout/qork-${{ matrix.target }}.pkg"
          name="$(basename "$f")"
          # cargo-dist sidecar format: lowercase-hex SHA256, space, asterisk,
          # filename. No trailing newline. shasum is preinstalled on macOS.
          hash="$(shasum -a 256 "$f" | awk '{print $1}')"
          printf '%s *%s' "$hash" "$name" > "$f.sha256"
          echo "  $name  ->  $hash"

      - name: Upload .pkg to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # --clobber so re-running this workflow doesn't require manually
          # deleting old assets first.
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "pkgout/qork-${{ matrix.target }}.pkg" \
            "pkgout/qork-${{ matrix.target }}.pkg.sha256" \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Uploaded qork-${{ matrix.target }}.pkg (+ .sha256) to ${{ steps.tag.outputs.tag }}"

  # ── Linux: .deb + .rpm for x86_64 and aarch64 via nfpm ────────────────────
  linux-deb-rpm:
    name: Build Linux .deb + .rpm
    runs-on: ubuntu-latest

    steps:
      - name: Resolve target tag and version
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${{ github.ref_name }}"
          fi
          version="${tag#v}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Tag:     $tag"
          echo "Version: $version"

      - name: Checkout tag
        # nfpm.yaml + LICENSE + README.md live in the repo and are referenced by
        # the package `contents`, so we need the source tree at this tag.
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          persist-credentials: false

      - name: Install nfpm
        shell: bash
        run: |
          # Pin a known-good nfpm release. Installs the `nfpm` binary to
          # /usr/local/bin (on PATH for subsequent steps).
          NFPM_VERSION=2.43.0
          url="https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz"
          curl --proto '=https' --tlsv1.2 -LsSf "$url" -o /tmp/nfpm.tar.gz
          tar -xzf /tmp/nfpm.tar.gz -C /tmp nfpm
          sudo install -m 0755 /tmp/nfpm /usr/local/bin/nfpm
          nfpm --version

      - name: Wait for cargo-dist release to exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          repo="${{ github.repository }}"
          deadline=$(( $(date +%s) + 20 * 60 ))
          found=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if gh release view "$tag" --repo "$repo" >/dev/null 2>&1; then
              found=1
              break
            fi
            echo "Release $tag not published yet; waiting 30s..."
            sleep 30
          done
          if [ "$found" -ne 1 ]; then
            echo "Timed out waiting for release $tag to be published by release.yml." >&2
            echo "Re-run once the release exists: gh workflow run 'Unix Installers' -f tag=$tag" >&2
            exit 1
          fi
          echo "Release $tag is published — proceeding."

      - name: Build .deb + .rpm for each architecture
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          repo="${{ github.repository }}"
          export QORK_VERSION="${{ steps.tag.outputs.version }}"

          mkdir -p dl out

          # (cargo-dist target triple, nfpm/Go arch, artifact-name stem)
          build_one() {
            local target="$1" arch="$2"
            local archive="qork-${target}.tar.xz"

            echo "::group::$target ($arch)"
            gh release download "$tag" --repo "$repo" --pattern "$archive" --dir dl
            if [ ! -f "dl/$archive" ]; then
              echo "Expected archive dl/$archive not found" >&2
              exit 1
            fi

            # Extract; locate `qork` with find (robust to layout changes).
            rm -rf "extract-$arch"
            mkdir -p "extract-$arch"
            tar -xJf "dl/$archive" -C "extract-$arch"
            local bin
            bin="$(find "extract-$arch" -type f -name qork | head -n1)"
            if [ -z "$bin" ]; then
              echo "Could not find the qork binary inside $archive" >&2
              exit 1
            fi

            export QORK_ARCH="$arch"
            export QORK_BIN="$bin"

            # nfpm expands ${QORK_*} env vars in nfpm.yaml at package time.
            # --target as a filename writes exactly that name.
            nfpm package --config nfpm.yaml --packager deb --target "out/qork-${target}.deb"
            nfpm package --config nfpm.yaml --packager rpm --target "out/qork-${target}.rpm"

            if [ ! -f "out/qork-${target}.deb" ] || [ ! -f "out/qork-${target}.rpm" ]; then
              echo "nfpm did not produce expected .deb/.rpm for $target" >&2
              exit 1
            fi
            echo "Built qork-${target}.deb and qork-${target}.rpm"
            echo "::endgroup::"
          }

          build_one x86_64-unknown-linux-gnu  amd64
          build_one aarch64-unknown-linux-gnu arm64

      - name: Compute SHA256 sidecars
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            out/qork-x86_64-unknown-linux-gnu.deb \
            out/qork-x86_64-unknown-linux-gnu.rpm \
            out/qork-aarch64-unknown-linux-gnu.deb \
            out/qork-aarch64-unknown-linux-gnu.rpm
          do
            name="$(basename "$f")"
            # cargo-dist sidecar format: lowercase-hex SHA256, space, asterisk,
            # filename. No trailing newline.
            hash="$(sha256sum "$f" | awk '{print $1}')"
            printf '%s *%s' "$hash" "$name" > "$f.sha256"
            echo "  $name  ->  $hash"
          done

      - name: Upload .deb + .rpm to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            out/qork-x86_64-unknown-linux-gnu.deb \
            out/qork-x86_64-unknown-linux-gnu.deb.sha256 \
            out/qork-x86_64-unknown-linux-gnu.rpm \
            out/qork-x86_64-unknown-linux-gnu.rpm.sha256 \
            out/qork-aarch64-unknown-linux-gnu.deb \
            out/qork-aarch64-unknown-linux-gnu.deb.sha256 \
            out/qork-aarch64-unknown-linux-gnu.rpm \
            out/qork-aarch64-unknown-linux-gnu.rpm.sha256 \
            --repo "${{ github.repository }}" \
            --clobber
          echo "Uploaded 8 Linux assets to ${{ steps.tag.outputs.tag }}"
